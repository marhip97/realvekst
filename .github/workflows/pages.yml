name: Publiser dashbord til GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v4

      - name: List filer som skal lastes opp
        run: |
          echo "Innhold av src/dashboard/:"
          ls -la src/dashboard/
          echo ""
          echo "Innhold av src/dashboard/data/:"
          ls -la src/dashboard/data/ || echo "(mappen finnes ikke)"
          echo ""
          echo "Innhold av src/dashboard/data/departementer/:"
          ls -la src/dashboard/data/departementer/ || echo "(mappen finnes ikke)"
          echo ""
          echo "Total størrelse:"
          du -sh src/dashboard/

      - name: Konfigurer Pages
        uses: actions/configure-pages@v5

      - name: Last opp artefakt fra src/dashboard
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/dashboard

      - name: Distribuer til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
