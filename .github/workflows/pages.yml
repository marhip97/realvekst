name: Publiser dashbord til GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "src/dashboard/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v4

      - name: Konfigurer Pages
        uses: actions/configure-pages@v5

      - name: Last opp artefakt fra src/dashboard
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/dashboard

      - name: Distribuer til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
