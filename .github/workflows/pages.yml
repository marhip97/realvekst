name: Publiser dashbord til GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v4

      - name: List filer som skal lastes opp
        run: |
          echo "Innhold av src/dashboard/:"
          ls -la src/dashboard/
          echo ""
          echo "Innhold av src/dashboard/data/:"
          ls -la src/dashboard/data/ || echo "(mappen finnes ikke)"
          echo ""
          echo "Innhold av src/dashboard/data/departementer/:"
          ls -la src/dashboard/data/departementer/ || echo "(mappen finnes ikke)"
          echo ""
          echo "Total størrelse:"
          du -sh src/dashboard/

      - name: Cache-bust CSS og JS med commit-SHA
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "Cache-bust med v=$SHA"
          sed -i "s|href=\"tokens.css\"|href=\"tokens.css?v=$SHA\"|g" src/dashboard/index.html
          sed -i "s|href=\"styles.css\"|href=\"styles.css?v=$SHA\"|g" src/dashboard/index.html
          sed -i "s|src=\"dashboard.js\"|src=\"dashboard.js?v=$SHA\"|g" src/dashboard/index.html
          echo "Verifisering:"
          grep -o 'v=[a-f0-9]*' src/dashboard/index.html | sort -u

      - name: Konfigurer Pages
        uses: actions/configure-pages@v5

      - name: Last opp artefakt fra src/dashboard
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/dashboard

      - name: Distribuer til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
